<app-header title="Cocina"></app-header>
<main class="pagina-cocina">
  <ng-container *ngIf="!isLoading && !errorMessage">
    <ng-container *ngIf="pedidos.length > 0; else emptyTemplate">
      <section
        *ngFor="let pedido of pedidos"
        class="pedido-card"
        [ngClass]="pedido.estado.toLowerCase()"
      >
        <div class="pedido-header">
          <span class="mesa">Mesa {{ pedido.mesa }}</span>
          <span class="numero">#{{ pedido.numero | number: '3.0-0' }}</span>
          <span class="badge" [ngClass]="pedido.estado.toLowerCase()">
            {{ pedido.estado }}
          </span>
        </div>

       <ul class="pedido-items">
  <li *ngFor="let item of pedido.items">
    <span class="item-qty">{{ item.split(' ')[0] }}</span>
    {{ item.split(' ').slice(1).join(' ') }}
  </li>
</ul>

        <div class="pedido-footer">
          <span class="hora">{{ pedido.hora }}</span>
          <span class="total">Total: ${{ pedido.total }}</span>
          <button
            *ngIf="pedido.estado === 'Pendiente'"
            (click)="marcarLista(pedido)"
            class="btn-lista"
          >
            Marcar como Lista
          </button>
          <button
            *ngIf="pedido.estado === 'Listo'"
            (click)="entregar(pedido)"
            class="btn-entregado"
          >
            Entregado
          </button>
        </div>
      </section>
    </ng-container>
    <ng-template #emptyTemplate>
      <p class="texto-vacio">No hay pedidos activos.</p>
    </ng-template>
  </ng-container>
</main>
