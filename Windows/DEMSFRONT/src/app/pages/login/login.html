<app-auth-layout>
  <div class="wrapper">
    <div class="card">
      <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
      <img src="../../../assets/cubiertos.png" class="logo" />

      <span class="title">DEMS!</span>


      <span class="subtitle">
        Dinner Environment Management <br />System </span>

      <!-- Usuario -->
      <app-input label="Usuario" type="text">
      </app-input>

      <!-- Contraseña -->
      <app-input label="Contraseña" [isPasswordToggle]="true">
      </app-input>

      <!-- Botón -->
      <app-button [text]="'Ingresar'" (click)="onLogin()"></app-button>

    </div>
  </div>
</app-auth-layout>
