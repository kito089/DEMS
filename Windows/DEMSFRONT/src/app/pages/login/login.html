<app-auth-layout>
  <div class="wrapper">
    <div class="card">
      <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
      <img src="../../../assets/cubiertos.png" class="logo" />

      <span class="title">DEMS!</span>

      <span class="subtitle">
        Dinner Environment Management <br />System
      </span>

      <app-input #inputUsuario label="Usuario" type="text"
        (enterPressed)="onLogin()">
      </app-input>

      <app-input #inputContraseña label="Contraseña" [isPasswordToggle]="true"
        (enterPressed)="onLogin()">
      </app-input>

      <app-button [text]="'Ingresar'" (click)="onLogin()"></app-button>

    </div>
  </div>
</app-auth-layout>
