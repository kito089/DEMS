<app-auth-layout>
  <div class="wrapper">
    <div class="card">

      <img src="../../../assets/cubiertos.png" class="logo" />

      <span class="title">DEMS!</span>


      <span class="subtitle">
        Dinner Environment Management <br />System </span>

      <!-- Usuario -->
      <app-input placeholder="Usuario"></app-input>

      <!-- Contraseña -->
      <app-input placeholder="Contraseña" type="password"></app-input>

      <!-- Botón -->
      <app-button [text]="'Ingresar'" (click)="onLogin()"></app-button>
      
    </div>
  </div>
</app-auth-layout>
