<ion-header class="ion-no-border">
  <ion-toolbar class="header-toolbar">
    <ion-title class="title">
      {{ title }}
    </ion-title>
    <ion-buttons slot="end">
      <img
        *ngIf="imageSrc"
        [src]="imageSrc"
        [alt]="imageAlt"
        class="header-image"
      />
    </ion-buttons>
  </ion-toolbar>
</ion-header>
