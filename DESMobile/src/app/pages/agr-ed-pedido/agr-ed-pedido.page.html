<ion-content [fullscreen]="true" class="agr-ed-pedido-page-content">
  <app-page-body>
    <div class="page-column">
      <app-page-header-cream
        title="Nuevo pedido"
        imageSrc="https://storage.googleapis.com/tagjs-prod.appspot.com/v1/3NWzJkfAGi/swq88tag_expires_30_days.png"
      />

      <app-elevated-panel preset="agr-order-type">
        <span class="field-label">Tipo de pedido</span>
        <div class="centered-buttons">
          <app-choice-split-buttons
            (primaryClick)="onOrderTypeChange('local')"
            (secondaryClick)="onOrderTypeChange('pickup')"
          />
        </div>
      </app-elevated-panel>

      <app-elevated-panel preset="agr-mesa" *ngIf="orderType === 'local'">
        <span class="field-label field-label--mesa">NÚMERO DE MESA</span>
        <app-mesa-input-row
          placeholder="Ej. Mesa 3"
          trailingIconSrc="https://storage.googleapis.com/tagjs-prod.appspot.com/v1/3NWzJkfAGi/oebt75zs_expires_30_days.png"
        />
      </app-elevated-panel>

      <app-elevated-panel preset="agr-dishes">
        <div class="dish-toolbar">
          <span class="field-label field-label--plain">PLATILLOS</span>
          <app-toolbar-icon-button
            shape="square"
            iconSrc="https://storage.googleapis.com/tagjs-prod.appspot.com/v1/3NWzJkfAGi/hn3kyqre_expires_30_days.png"
            label="Agregar"
            (pressed)="noop()"
          />
        </div>

        <app-dish-edit-row
          *ngFor="let dish of dishes; let i = index"
          [name]="dish.name"
          [quantity]="dish.quantity.toString()"
          [nameWidth]="i === 0 ? 'full' : i === 1 ? 'natural' : 'wide'"
          [noteShape]="i === 0 || i === 2 ? 'pill-wide' : 'pill'"
          [leadingFlexSpacer]="i === 1"
          minusIconSrc="https://storage.googleapis.com/tagjs-prod.appspot.com/v1/3NWzJkfAGi/{{ i === 0 ? '8zdzl7jb' : i === 1 ? 'apikmqg9' : 'iiyu2i4j' }}_expires_30_days.png"
          plusIconSrc="https://storage.googleapis.com/tagjs-prod.appspot.com/v1/3NWzJkfAGi/{{ i === 0 ? 'w8qswv7a' : i === 1 ? 'g2syc8z1' : 'c5k6aeka' }}_expires_30_days.png"
          noteIconSrc="https://storage.googleapis.com/tagjs-prod.appspot.com/v1/3NWzJkfAGi/{{ i === 0 ? 'dexz6kwj' : i === 1 ? 'ytmjuf7m' : 'xcozat2x' }}_expires_30_days.png"
          (noteClick)="noop()"
          (minusClick)="onDishMinus(i)"
          (plusClick)="onDishPlus(i)"
        />
      </app-elevated-panel>

      <app-divider-line tone="section" />

      <app-primary-button label="Guardar pedido" widthMode="centered" (pressed)="noop()" />

      <app-bottom-nav
        pedidosIconSrc="https://storage.googleapis.com/tagjs-prod.appspot.com/v1/3NWzJkfAGi/ckb0ty6i_expires_30_days.png"
        reservacionesIconSrc="https://storage.googleapis.com/tagjs-prod.appspot.com/v1/3NWzJkfAGi/cwh83t4f_expires_30_days.png"
      />
    </div>
  </app-page-body>
</ion-content>
