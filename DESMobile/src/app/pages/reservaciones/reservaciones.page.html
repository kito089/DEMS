<app-page-header-cream title="Reservaciones"
  imageSrc="https://storage.googleapis.com/tagjs-prod.appspot.com/v1/3NWzJkfAGi/7o7i60ed_expires_30_days.png" />

<ion-content [fullscreen]="true" class="reservaciones-page-content">
  <app-page-body scrollVariant="reservaciones">
    <app-section-intro text="Se muestran las reservaciones próximas en esta semana" />

    <app-reservation-row *ngFor="let reservation of reservations" variant="inline-meta" spacing="tight"
      [datePrimary]="getMes(reservation.Fecha)" [dateSecondary]="getDia(reservation.Fecha)"
      [title]="reservation.NombreCliente" [metaLine1]="reservation.NoPersonas + ' personas'"
      [metaLine2]="reservation.Telefono"
      actionIconSrc="https://storage.googleapis.com/tagjs-prod.appspot.com/v1/3NWzJkfAGi/vjktmwvw_expires_30_days.png" />

  </app-page-body>
</ion-content>
<app-bottom-nav
  pedidosIconSrc="https://storage.googleapis.com/tagjs-prod.appspot.com/v1/3NWzJkfAGi/n35lrhn3_expires_30_days.png"
  reservacionesIconSrc="https://storage.googleapis.com/tagjs-prod.appspot.com/v1/3NWzJkfAGi/nl035q1v_expires_30_days.png" />
