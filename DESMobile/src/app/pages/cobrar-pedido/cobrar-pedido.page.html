<app-page-header-cream
  title="Cobrar P-012"
  imageSrc="https://storage.googleapis.com/tagjs-prod.appspot.com/v1/3NWzJkfAGi/01bc3aoa_expires_30_days.png"
/>

<ion-content [fullscreen]="true" class="cobrar-pedido-page-content">
  <app-page-body>
    <div class="page-column">
      <app-elevated-panel preset="cobrar-ticket">
        <app-ticket-brand-header brand="DEMS! LOMA BONITA" subheading="Mesa 3 - P-012" />

        <app-ticket-line-row description="2x Enchiladas verdes" price="$170" />

        <app-divider-line />

        <app-ticket-line-row
          description="1x Pozole rojo (sin limón)"
          price="$110"
          [flexDescription]="true"
        />

        <app-divider-line />

        <app-ticket-line-row description="2x Agua de Jamaica" price="$60" />

        <app-divider-line />

        <app-ticket-line-row
          description="2x Flautas (no muy doradas)"
          price="$100"
          [flexDescription]="true"
          [tightRightMargin]="true"
        />

        <app-divider-line tone="soft" spacing="tight-before-total" />

        <app-divider-line tone="emphasis" spacing="tight-before-total" />

        <app-ticket-total-row label="Total" amount="$440" />
      </app-elevated-panel>

      <div class="actions">
        <app-primary-button
          label="Imprimir ticket"
          widthMode="centered"
          padding="wide"
          labelSize="body"
          (pressed)="noop()"
        />
        <app-primary-button
          label="Cobrado- Cerrar pedido"
          widthMode="centered"
          padding="compact"
          labelSize="body"
          (pressed)="noop()"
        />
      </div>
    </div>
  </app-page-body>
  <app-bottom-nav
  pedidosIconSrc="assets/NewPedido.png"
    reservacionesIconSrc="assets/Reserva.png"
  />
</ion-content>
